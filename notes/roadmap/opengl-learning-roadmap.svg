<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1050" viewBox="0 0 1600 1050">
  <defs>
    <style>
      .bg { fill: #10131a; }
      .title { fill: #f4f7fb; font: 700 42px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
      .subtitle { fill: #aeb8c8; font: 23px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
      .cardTitle { fill: #ffffff; font: 700 25px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
      .body { fill: #dfe7f3; font: 19px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
      .small { fill: #aeb8c8; font: 17px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
      .tag { fill: #10131a; font: 700 16px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
      .line { stroke: #566174; stroke-width: 4; stroke-linecap: round; }
      .arrow { fill: #566174; }
      .card { stroke-width: 2.5; rx: 22; }
      .base { fill: #13251f; stroke: #2fbf71; }
      .now { fill: #202131; stroke: #8f7cff; }
      .pbr1 { fill: #162233; stroke: #4ea4ff; }
      .pbr2 { fill: #2a2115; stroke: #f3a742; }
      .unity { fill: #2a1720; stroke: #ff6b8a; }
      .future { fill: #172521; stroke: #47d6a3; }
      .chipBase { fill: #2fbf71; }
      .chipNow { fill: #8f7cff; }
      .chipPbr1 { fill: #4ea4ff; }
      .chipPbr2 { fill: #f3a742; }
      .chipUnity { fill: #ff6b8a; }
      .chipFuture { fill: #47d6a3; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="1050"/>
  <text x="80" y="88" class="title">PBR-first 学习路线：OpenGL 拆底层，Unity 做效果</text>
  <text x="80" y="130" class="subtitle">当前策略：直接进入 PBR 原理；Camera / Depth / Lighting / IBL 作为按需补课，不再当硬前置。</text>

  <line x1="165" y1="260" x2="1435" y2="260" class="line"/>
  <polygon points="1448,260 1426,248 1426,272" class="arrow"/>

  <g transform="translate(80,180)">
    <rect class="card base" x="0" y="0" width="320" height="235"/>
    <rect class="chipBase" x="24" y="22" width="82" height="30" rx="15"/>
    <text x="44" y="43" class="tag">已有</text>
    <text x="24" y="84" class="cardTitle">基础储备</text>
    <text x="24" y="124" class="body">VAO / VBO / Shader</text>
    <text x="24" y="156" class="body">Texture / UV / Uniform</text>
    <text x="24" y="188" class="body">Transform / Model Matrix</text>
    <text x="24" y="220" class="body">RenderDoc 初步观察</text>
  </g>

  <g transform="translate(435,180)">
    <rect class="card now" x="0" y="0" width="320" height="235"/>
    <rect class="chipNow" x="24" y="22" width="82" height="30" rx="15"/>
    <text x="44" y="43" class="tag">现在</text>
    <text x="24" y="84" class="cardTitle">PBR 参数直觉</text>
    <text x="24" y="124" class="body">Albedo: 物体本色</text>
    <text x="24" y="156" class="body">Metallic: 金属程度</text>
    <text x="24" y="188" class="body">Roughness: 高光宽窄</text>
    <text x="24" y="220" class="body">AO: 环境遮蔽</text>
  </g>

  <g transform="translate(790,180)">
    <rect class="card pbr1" x="0" y="0" width="320" height="235"/>
    <rect class="chipPbr1" x="24" y="22" width="82" height="30" rx="15"/>
    <text x="44" y="43" class="tag">结构</text>
    <text x="24" y="84" class="cardTitle">PBR 光照分工</text>
    <text x="24" y="124" class="body">Diffuse + Specular</text>
    <text x="24" y="156" class="body">能量守恒直觉</text>
    <text x="24" y="188" class="body">金属 / 非金属区别</text>
    <text x="24" y="220" class="body">BRDF 是反射规则</text>
  </g>

  <g transform="translate(1145,180)">
    <rect class="card pbr2" x="0" y="0" width="320" height="235"/>
    <rect class="chipPbr2" x="24" y="22" width="82" height="30" rx="15"/>
    <text x="44" y="43" class="tag">公式</text>
    <text x="24" y="84" class="cardTitle">Cook-Torrance</text>
    <text x="24" y="124" class="body">F: Fresnel</text>
    <text x="24" y="156" class="body">D: 法线分布 NDF</text>
    <text x="24" y="188" class="body">G: 几何遮蔽</text>
    <text x="24" y="220" class="body">先看职责，不推公式</text>
  </g>

  <g transform="translate(255,500)">
    <rect class="card unity" x="0" y="0" width="430" height="235"/>
    <rect class="chipUnity" x="28" y="24" width="92" height="30" rx="15"/>
    <text x="52" y="45" class="tag">Unity</text>
    <text x="28" y="90" class="cardTitle">PBR Shader 实战</text>
    <text x="28" y="130" class="body">材质球参数矩阵</text>
    <text x="28" y="162" class="body">Fresnel / Water / Glass</text>
    <text x="28" y="194" class="body">Metallic / Roughness 对照</text>
    <text x="28" y="226" class="body">截图 + Q&amp;A 进复盘</text>
  </g>

  <g transform="translate(760,500)">
    <rect class="card future" x="0" y="0" width="585" height="235"/>
    <rect class="chipFuture" x="28" y="24" width="92" height="30" rx="15"/>
    <text x="58" y="45" class="tag">后续</text>
    <text x="28" y="90" class="cardTitle">IBL / 环境光照</text>
    <text x="28" y="130" class="body">Diffuse IBL: 模糊环境光</text>
    <text x="28" y="162" class="body">Specular IBL: roughness 决定反射模糊</text>
    <text x="28" y="194" class="body">Skybox / Reflection Probe 对照</text>
    <text x="28" y="226" class="body">再进入 Shadow / HDR / Post Processing</text>
  </g>

  <line x1="685" y1="618" x2="760" y2="618" class="line"/>
  <polygon points="774,618 752,606 752,630" class="arrow"/>

  <g transform="translate(80,805)">
    <rect x="0" y="0" width="1440" height="185" rx="24" fill="#151a24" stroke="#30394a" stroke-width="2"/>
    <text x="32" y="48" class="cardTitle">执行规则</text>
    <text x="32" y="88" class="body">PBR 主线先走：每天只吃一个模块，例如 roughness、Fresnel、NDF、IBL。</text>
    <text x="32" y="124" class="body">Unity 里观察效果：用材质球、参数滑条、截图和 RenderDoc / Frame Debugger 建立反馈。</text>
    <text x="32" y="156" class="small">遇到依赖再补：Camera、Depth、Normal、Lighting、Cubemap 不消失，只是不再阻挡 PBR 起步。</text>
  </g>
</svg>
