<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1200" viewBox="0 0 1800 1200">
  <defs>
    <style>
      .bg { fill: #10131a; }
      .root { fill: #20273a; stroke: #f4c95d; stroke-width: 4; }
      .branch1 { fill: #13251f; stroke: #2fbf71; stroke-width: 3; }
      .branch2 { fill: #202131; stroke: #8f7cff; stroke-width: 3; }
      .branch3 { fill: #162233; stroke: #4ea4ff; stroke-width: 3; }
      .branch4 { fill: #2a2115; stroke: #f3a742; stroke-width: 3; }
      .branch5 { fill: #2a1720; stroke: #ff6b8a; stroke-width: 3; }
      .branch6 { fill: #172521; stroke: #47d6a3; stroke-width: 3; }
      .line { fill: none; stroke: #566174; stroke-width: 3; stroke-linecap: round; }
      .title { fill: #f4f7fb; font: 700 31px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
      .nodeTitle { fill: #fff; font: 700 23px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
      .text { fill: #dfe7f3; font: 18px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
      .small { fill: #aeb8c8; font: 16px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
    </style>
  </defs>
  <rect class="bg" width="1800" height="1200"/>

  <rect class="root" x="640" y="500" width="520" height="160" rx="34"/>
  <text x="690" y="570" class="title">Unity 开发者从 0 补图形学</text>
  <text x="715" y="615" class="small">OpenGL 理解底层，Unity 写 Shader 效果</text>

  <path class="line" d="M 640 555 C 520 520, 420 400, 350 260"/>
  <path class="line" d="M 640 600 C 500 630, 400 750, 330 900"/>
  <path class="line" d="M 900 500 C 880 390, 840 290, 760 170"/>
  <path class="line" d="M 1160 545 C 1320 510, 1420 390, 1490 240"/>
  <path class="line" d="M 1160 610 C 1310 650, 1410 770, 1480 930"/>
  <path class="line" d="M 900 660 C 890 780, 870 910, 830 1030"/>

  <g transform="translate(80,130)">
    <rect class="branch1" width="520" height="260" rx="24"/>
    <text x="30" y="52" class="nodeTitle">第 1-3 周：基础已建立</text>
    <text x="30" y="92" class="text">OpenGL 基础管线：VAO / VBO / EBO / Draw Call</text>
    <text x="30" y="128" class="text">Shader 数据入口：attribute / uniform</text>
    <text x="30" y="164" class="text">Texture / UV：图片上传、Sampler、Wrapping</text>
    <text x="30" y="200" class="text">Transform：Translate / Rotate / Scale</text>
    <text x="30" y="236" class="text">核心对应：Mesh + Material + Transform 的底层直觉</text>
  </g>

  <g transform="translate(80,790)">
    <rect class="branch2" width="520" height="270" rx="24"/>
    <text x="30" y="52" class="nodeTitle">第 4-5 周：Camera + Depth</text>
    <text x="30" y="92" class="text">OpenGL：Model / View / Projection</text>
    <text x="30" y="128" class="text">OpenGL：Depth Test / Z-Buffer / near-far</text>
    <text x="30" y="164" class="text">Unity Shader：UV 滚动 / UV 扭曲 / Mask</text>
    <text x="30" y="200" class="text">Unity Shader：Outline / Highlight / 深度观察</text>
    <text x="30" y="236" class="text">成果：能用 Camera 看 3D cube，并理解前后遮挡</text>
  </g>

  <g transform="translate(620,70)">
    <rect class="branch3" width="560" height="250" rx="24"/>
    <text x="30" y="52" class="nodeTitle">第 6-7 周：Lighting + Material</text>
    <text x="30" y="92" class="text">OpenGL：Normal / Ambient / Diffuse / Specular</text>
    <text x="30" y="128" class="text">OpenGL：多个 Object / Material / Texture / Light</text>
    <text x="30" y="164" class="text">Unity Shader：Rim Light / Toon Ramp / MatCap</text>
    <text x="30" y="200" class="text">Unity Shader：Normal Map / Emission / Dissolve / Flow</text>
    <text x="30" y="226" class="small">成果：一个小场景 + 一组可见材质效果</text>
  </g>

  <g transform="translate(1230,110)">
    <rect class="branch4" width="500" height="260" rx="24"/>
    <text x="30" y="52" class="nodeTitle">第 8-9 周：PBR 入口</text>
    <text x="30" y="92" class="text">先补：Cubemap / Environment Map / Reflection</text>
    <text x="30" y="128" class="text">再看：Albedo / Metallic / Roughness / AO</text>
    <text x="30" y="164" class="text">OpenGL：最小 Cook-Torrance PBR shader</text>
    <text x="30" y="200" class="text">Unity Shader：Fresnel / Water / Glass</text>
    <text x="30" y="236" class="text">判断：第 55-65 天进入比较稳</text>
  </g>

  <g transform="translate(1210,800)">
    <rect class="branch5" width="520" height="270" rx="24"/>
    <text x="30" y="52" class="nodeTitle">PBR 以后：现代渲染效果</text>
    <text x="30" y="92" class="text">IBL / Shadow / HDR / Tone Mapping</text>
    <text x="30" y="128" class="text">Post Processing / Deferred Rendering</text>
    <text x="30" y="164" class="text">Transparent / Blending / Sorting</text>
    <text x="30" y="200" class="text">Unity Shader：Bloom / Blur / Edge / Shield / Fire</text>
    <text x="30" y="236" class="text">调试：RenderDoc / Frame Debugger / Overdraw</text>
  </g>

  <g transform="translate(620,910)">
    <rect class="branch6" width="560" height="210" rx="24"/>
    <text x="30" y="52" class="nodeTitle">最终对照：回到 Unity URP / HDRP</text>
    <text x="30" y="92" class="text">看懂：Pass / RenderFeature / DepthOnly / ShadowCaster</text>
    <text x="30" y="128" class="text">看懂：Shader Graph 生成代码、材质属性、渲染队列</text>
    <text x="30" y="164" class="text">目标：能从项目效果反推底层数据、状态、shader、pass</text>
  </g>
</svg>
