<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1200" viewBox="0 0 1800 1200">
  <defs>
    <style>
      .bg { fill: #10131a; }
      .root { fill: #20273a; stroke: #f4c95d; stroke-width: 4; }
      .branch1 { fill: #13251f; stroke: #2fbf71; stroke-width: 3; }
      .branch2 { fill: #202131; stroke: #8f7cff; stroke-width: 3; }
      .branch3 { fill: #162233; stroke: #4ea4ff; stroke-width: 3; }
      .branch4 { fill: #2a2115; stroke: #f3a742; stroke-width: 3; }
      .branch5 { fill: #2a1720; stroke: #ff6b8a; stroke-width: 3; }
      .branch6 { fill: #172521; stroke: #47d6a3; stroke-width: 3; }
      .line { fill: none; stroke: #566174; stroke-width: 3; stroke-linecap: round; }
      .title { fill: #f4f7fb; font: 700 31px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
      .nodeTitle { fill: #fff; font: 700 23px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
      .text { fill: #dfe7f3; font: 18px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
      .small { fill: #aeb8c8; font: 16px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
    </style>
  </defs>
  <rect class="bg" width="1800" height="1200"/>

  <rect class="root" x="640" y="500" width="520" height="160" rx="34"/>
  <text x="755" y="570" class="title">PBR-first 学习路线</text>
  <text x="715" y="615" class="small">PBR 主线先走，缺前置概念就现场补</text>

  <path class="line" d="M 640 555 C 520 520, 420 400, 350 260"/>
  <path class="line" d="M 640 600 C 500 630, 400 750, 330 900"/>
  <path class="line" d="M 900 500 C 880 390, 840 290, 760 170"/>
  <path class="line" d="M 1160 545 C 1320 510, 1420 390, 1490 240"/>
  <path class="line" d="M 1160 610 C 1310 650, 1410 770, 1480 930"/>
  <path class="line" d="M 900 660 C 890 780, 870 910, 830 1030"/>

  <g transform="translate(80,130)">
    <rect class="branch1" width="520" height="260" rx="24"/>
    <text x="30" y="52" class="nodeTitle">已有基础</text>
    <text x="30" y="92" class="text">VAO / VBO / EBO / Draw Call</text>
    <text x="30" y="128" class="text">Shader attribute / uniform</text>
    <text x="30" y="164" class="text">Texture / UV / Sampler</text>
    <text x="30" y="200" class="text">Transform / Model Matrix</text>
    <text x="30" y="236" class="text">RenderDoc 初步观察</text>
  </g>

  <g transform="translate(80,790)">
    <rect class="branch2" width="520" height="270" rx="24"/>
    <text x="30" y="52" class="nodeTitle">PBR 参数直觉</text>
    <text x="30" y="92" class="text">Albedo：物体本色，不含光照</text>
    <text x="30" y="128" class="text">Metallic：金属 / 非金属分界</text>
    <text x="30" y="164" class="text">Roughness：高光宽窄和反射清晰度</text>
    <text x="30" y="200" class="text">AO：环境遮蔽，缝隙角落更暗</text>
    <text x="30" y="236" class="text">Unity：材质球参数矩阵</text>
  </g>

  <g transform="translate(620,70)">
    <rect class="branch3" width="560" height="250" rx="24"/>
    <text x="30" y="52" class="nodeTitle">PBR 光照结构</text>
    <text x="30" y="92" class="text">最终颜色不是单一高光，而是 diffuse + specular</text>
    <text x="30" y="128" class="text">Diffuse：非金属漫反射</text>
    <text x="30" y="164" class="text">Specular：高光和反射</text>
    <text x="30" y="200" class="text">Energy Conservation：能量不凭空增加</text>
    <text x="30" y="226" class="small">BRDF：描述入射光如何被表面反射</text>
  </g>

  <g transform="translate(1230,110)">
    <rect class="branch4" width="500" height="260" rx="24"/>
    <text x="30" y="52" class="nodeTitle">Cook-Torrance 结构</text>
    <text x="30" y="92" class="text">F / Fresnel：擦边角反射更强</text>
    <text x="30" y="128" class="text">D / NDF：微表面法线分布</text>
    <text x="30" y="164" class="text">G / Geometry：微表面遮挡</text>
    <text x="30" y="200" class="text">先看职责，不推公式</text>
    <text x="30" y="236" class="text">再用 Unity 材质观察变化</text>
  </g>

  <g transform="translate(1210,800)">
    <rect class="branch5" width="520" height="270" rx="24"/>
    <text x="30" y="52" class="nodeTitle">Unity PBR 实战</text>
    <text x="30" y="92" class="text">材质球参数矩阵</text>
    <text x="30" y="128" class="text">Fresnel / Water / Glass</text>
    <text x="30" y="164" class="text">Metallic / Roughness 对照</text>
    <text x="30" y="200" class="text">截图和 Q&amp;A 进入复盘</text>
    <text x="30" y="236" class="text">之后接 Bloom / Outline / Shield / Fire</text>
  </g>

  <g transform="translate(620,910)">
    <rect class="branch6" width="560" height="210" rx="24"/>
    <text x="30" y="52" class="nodeTitle">按需补课</text>
    <text x="30" y="92" class="text">Camera / MVP、Depth / ZBuffer</text>
    <text x="30" y="128" class="text">Normal / Lighting、Cubemap / Environment Map</text>
    <text x="30" y="164" class="text">IBL、Shadow、HDR、Post Processing、URP / HDRP</text>
  </g>
</svg>
