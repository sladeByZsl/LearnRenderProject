<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <style>
      .bg { fill: #11151d; }
      .title { fill: #f7f9fc; font: 700 42px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
      .sub { fill: #aeb8c8; font: 22px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
      .panel { fill: #17202b; stroke: #3c4657; stroke-width: 3; rx: 22; }
      .good { fill: #10261e; stroke: #49c57a; stroke-width: 3; rx: 22; }
      .bad { fill: #2b1719; stroke: #ff6b6b; stroke-width: 3; rx: 22; }
      .h { fill: #ffffff; font: 700 29px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
      .body { fill: #dfe7f3; font: 22px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
      .small { fill: #aeb8c8; font: 18px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
      .rayIn { stroke: #ffd166; stroke-width: 8; stroke-linecap: round; }
      .rayOut { stroke: #59d185; stroke-width: 6; stroke-linecap: round; }
      .rayBad { stroke: #ff6b6b; stroke-width: 10; stroke-linecap: round; }
      .arrow { fill: #ffd166; }
      .green { fill: #49c57a; }
      .red { fill: #ff6b6b; }
      .chip { fill: #ffd166; }
      .chipText { fill: #12151b; font: 700 18px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
      .surface { fill: #2f3948; }
    </style>
  </defs>
  <rect class="bg" width="1400" height="900"/>
  <text x="70" y="82" class="title">Day 26：Energy Conservation / 能量守恒</text>
  <text x="70" y="124" class="sub">关键判断：材质不能反射出比收到的光更多的光。</text>

  <g transform="translate(80,180)">
    <rect class="good" width="590" height="420"/>
    <rect class="chip" x="34" y="30" width="150" height="34" rx="17"/>
    <text class="chipText" x="59" y="54">合理材质</text>
    <text class="h" x="34" y="108">入射光被分配</text>
    <line class="rayIn" x1="105" y1="185" x2="245" y2="260"/>
    <polygon class="arrow" points="255,266 227,265 240,241"/>
    <rect class="surface" x="230" y="282" width="150" height="28" rx="14"/>
    <line class="rayOut" x1="375" y1="268" x2="485" y2="205"/>
    <polygon class="green" points="496,199 470,203 483,225"/>
    <line class="rayOut" x1="378" y1="292" x2="500" y2="304"/>
    <polygon class="green" points="514,305 490,292 488,318"/>
    <text class="body" x="34" y="355">diffuse + specular</text>
    <text class="small" x="34" y="390">总量不超过入射光：稳定、可信</text>
  </g>

  <g transform="translate(730,180)">
    <rect class="bad" width="590" height="420"/>
    <rect class="chip" x="34" y="30" width="150" height="34" rx="17"/>
    <text class="chipText" x="59" y="54">错误直觉</text>
    <text class="h" x="34" y="108">所有项都随便加亮</text>
    <line class="rayIn" x1="105" y1="185" x2="245" y2="260"/>
    <polygon class="arrow" points="255,266 227,265 240,241"/>
    <rect class="surface" x="230" y="282" width="150" height="28" rx="14"/>
    <line class="rayBad" x1="372" y1="260" x2="520" y2="176"/>
    <polygon class="red" points="533,169 503,174 519,199"/>
    <line class="rayBad" x1="378" y1="294" x2="535" y2="330"/>
    <polygon class="red" points="550,333 525,315 519,342"/>
    <text class="body" x="34" y="355">越加越亮</text>
    <text class="small" x="34" y="390">换光照后容易假亮、穿帮</text>
  </g>

  <g transform="translate(170,675)">
    <rect class="panel" width="1060" height="145"/>
    <text class="h" x="34" y="55">30 秒记忆</text>
    <text class="body" x="34" y="98">PBR 不是不让材质亮，而是不让光凭空变多。</text>
    <text class="small" x="34" y="126">Diffuse 和 Specular 要分配能量，不是两个亮度层无脑相加。</text>
  </g>
</svg>

