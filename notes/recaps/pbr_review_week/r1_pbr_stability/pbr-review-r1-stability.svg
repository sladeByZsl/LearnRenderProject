<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <style>
      .bg { fill: #10131a; }
      .title { fill: #f7f9fc; font: 700 42px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
      .sub { fill: #aeb8c8; font: 22px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
      .panel { fill: #17202b; stroke: #526079; stroke-width: 3; rx: 22; }
      .bad { fill: #2b1719; stroke: #ff6b6b; stroke-width: 3; rx: 22; }
      .good { fill: #10251f; stroke: #59d185; stroke-width: 3; rx: 22; }
      .chip { fill: #ffd166; }
      .chipText { fill: #10131a; font: 700 18px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
      .h { fill: #ffffff; font: 700 30px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
      .body { fill: #dfe7f3; font: 22px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
      .small { fill: #aeb8c8; font: 18px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
      .sphere { stroke: #dfe7f3; stroke-width: 3; }
      .cold { fill: url(#coldSphere); }
      .warm { fill: url(#warmSphere); }
      .stable { fill: url(#stableSphere); }
      .arrow { stroke: #dfe7f3; stroke-width: 5; stroke-linecap: round; marker-end: url(#arrowHead); }
      .line { stroke: #657185; stroke-width: 3; }
      .formula { fill: #ffffff; font: 700 30px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
    </style>
    <marker id="arrowHead" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#dfe7f3"/>
    </marker>
    <radialGradient id="coldSphere" cx="35%" cy="28%" r="75%">
      <stop offset="0%" stop-color="#d8ecff"/>
      <stop offset="35%" stop-color="#6da6db"/>
      <stop offset="100%" stop-color="#26354f"/>
    </radialGradient>
    <radialGradient id="warmSphere" cx="35%" cy="28%" r="75%">
      <stop offset="0%" stop-color="#fff0c7"/>
      <stop offset="35%" stop-color="#d99645"/>
      <stop offset="100%" stop-color="#4a2c1d"/>
    </radialGradient>
    <radialGradient id="stableSphere" cx="35%" cy="28%" r="75%">
      <stop offset="0%" stop-color="#f6f8fb"/>
      <stop offset="38%" stop-color="#9fa8b7"/>
      <stop offset="100%" stop-color="#3f4858"/>
    </radialGradient>
  </defs>

  <rect class="bg" width="1400" height="900"/>
  <text x="70" y="82" class="title">PBR 复习周 R1：材质稳定性</text>
  <text x="70" y="124" class="sub">复习目标：PBR 不是自动真实，而是让材质参数在不同环境里更稳定。</text>

  <g transform="translate(80,180)">
    <rect class="bad" width="560" height="390"/>
    <rect class="chip" x="34" y="30" width="150" height="34" rx="17"/>
    <text class="chipText" x="63" y="54">旧直觉</text>
    <text class="h" x="34" y="110">为了当前场景调好看</text>
    <circle class="sphere cold" cx="170" cy="230" r="70"/>
    <circle class="sphere warm" cx="360" cy="230" r="70"/>
    <line class="arrow" x1="245" y1="230" x2="285" y2="230"/>
    <text class="body" x="34" y="335">材质里混进灯光补偿</text>
    <text class="small" x="34" y="365">换环境后容易偏色、假亮、不可复用</text>
  </g>

  <g transform="translate(760,180)">
    <rect class="good" width="560" height="390"/>
    <rect class="chip" x="34" y="30" width="150" height="34" rx="17"/>
    <text class="chipText" x="63" y="54">PBR 直觉</text>
    <text class="h" x="34" y="110">材质描述材料，灯光描述环境</text>
    <circle class="sphere stable" cx="170" cy="230" r="70"/>
    <circle class="sphere stable" cx="360" cy="230" r="70"/>
    <line class="arrow" x1="245" y1="230" x2="285" y2="230"/>
    <text class="body" x="34" y="335">同一材质换环境仍然可信</text>
    <text class="small" x="34" y="365">能量守恒限制 diffuse + specular 无脑变亮</text>
  </g>

  <g transform="translate(170,665)">
    <rect class="panel" width="1060" height="155"/>
    <text class="formula" x="34" y="58">30 秒复习</text>
    <text class="body" x="34" y="100">PBR 的第一层价值：让材质参数有稳定含义。</text>
    <text class="small" x="34" y="130">今天不要推进新内容，只确认自己能解释“为什么材质不能替灯光擦屁股”。</text>
  </g>
</svg>

