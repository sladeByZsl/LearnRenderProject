<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <style>
      .bg { fill: #10131a; }
      .title { fill: #f7f9fc; font: 700 42px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
      .sub { fill: #aeb8c8; font: 22px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
      .panel { fill: #17202b; stroke: #526079; stroke-width: 3; rx: 22; }
      .good { fill: #10251f; stroke: #59d185; stroke-width: 3; rx: 22; }
      .slant { fill: #2a2115; stroke: #f3a742; stroke-width: 3; rx: 22; }
      .surface { stroke: #dfe7f3; stroke-width: 10; stroke-linecap: round; }
      .spread { fill: #ffd166; opacity: .22; stroke: #ffd166; stroke-width: 3; }
      .ray { stroke: #ffd166; stroke-width: 6; stroke-linecap: round; marker-end: url(#arrowGold); }
      .normal { stroke: #64b5ff; stroke-width: 5; stroke-linecap: round; }
      .h { fill: #ffffff; font: 700 30px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
      .body { fill: #dfe7f3; font: 22px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
      .small { fill: #aeb8c8; font: 18px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
      .formula { fill: #ffffff; font: 700 34px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
      .chip { fill: #64b5ff; }
      .chip2 { fill: #f3a742; }
      .chipText { fill: #10131a; font: 700 18px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
      .angle { fill: none; stroke: #ff6b6b; stroke-width: 4; stroke-linecap: round; }
      .red { fill: #ff8585; }
    </style>
    <marker id="arrowGold" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#ffd166"/>
    </marker>
  </defs>

  <rect class="bg" width="1400" height="900"/>
  <text x="70" y="82" class="title">Day 30：Cosine Weight / cosθ 投影项</text>
  <text x="70" y="124" class="sub">关键判断：斜着来的光会摊开，单位面积收到的光更少。</text>

  <g transform="translate(80,180)">
    <rect class="good" width="560" height="410"/>
    <rect class="chip" x="34" y="30" width="150" height="34" rx="17"/>
    <text class="chipText" x="61" y="54">正面照射</text>
    <text class="h" x="34" y="110">θ = 0，cosθ = 1</text>
    <line class="surface" x1="95" y1="300" x2="465" y2="300"/>
    <line class="normal" x1="280" y1="300" x2="280" y2="110"/>
    <text class="small" x="295" y="132">normal</text>
    <line class="ray" x1="230" y1="105" x2="230" y2="270"/>
    <line class="ray" x1="330" y1="105" x2="330" y2="270"/>
    <rect class="spread" x="225" y="300" width="110" height="30"/>
    <text class="body" x="34" y="365">光集中落在较小范围</text>
  </g>

  <g transform="translate(760,180)">
    <rect class="slant" width="560" height="410"/>
    <rect class="chip2" x="34" y="30" width="150" height="34" rx="17"/>
    <text class="chipText" x="61" y="54">斜着照射</text>
    <text class="h" x="34" y="110">θ 变大，cosθ 变小</text>
    <line class="surface" x1="95" y1="300" x2="465" y2="300"/>
    <line class="normal" x1="280" y1="300" x2="280" y2="110"/>
    <text class="small" x="295" y="132">normal</text>
    <line class="ray" x1="210" y1="105" x2="315" y2="270"/>
    <line class="ray" x1="305" y1="105" x2="410" y2="270"/>
    <rect class="spread" x="305" y="300" width="115" height="30"/>
    <path class="angle" d="M280 165 A75 75 0 0 1 323 203"/>
    <text class="red" x="315" y="177" style="font:700 24px Arial, sans-serif;">θ</text>
    <text class="body" x="34" y="365">同样的光摊到更大范围</text>
  </g>

  <g transform="translate(170,675)">
    <rect class="panel" width="1060" height="145"/>
    <text class="formula" x="34" y="58">有效贡献 ≈ 入射光 × cosθ</text>
    <text class="body" x="34" y="100">θ 越大，光越斜，单位面积收到的光越少。</text>
    <text class="small" x="34" y="128">在 irradiance 半球积分里，dω 负责方向范围，cosθ 负责投影衰减。</text>
  </g>
</svg>

